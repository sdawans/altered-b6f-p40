<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BWAT 6-Faction Tournament — Padawan's 40th B-Day Special</title>
  <!-- bump ?v= when pushing CSS/JS changes -->
  <link rel="stylesheet" href="css/style.css?v=11">
  <link rel="icon" type="image/jpeg" href="img/bwat.jpg">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <img class="header__banner" src="img/artwork/KA-06_Seeds-of-Unity.jpg" alt="">
      <img class="header__logo" src="img/bwat.jpg" alt="BWAT">
      <div class="header__subtitle" id="header-subtitle"></div>
      <h1 class="header__title" id="header-title"></h1>
      <div class="header__meta" id="header-meta"></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tabs__btn tabs__btn--active" data-tab="results">Results</button>
      <button class="tabs__btn" data-tab="standings">Standings</button>
      <button class="tabs__btn" data-tab="conquest">Conquest</button>
      <button class="tabs__btn" data-tab="rounds">Rounds</button>
      <button class="tabs__btn" data-tab="factionStats">Factions</button>
      <button class="tabs__btn" data-tab="heroStats">Heroes</button>
      <button class="tabs__btn" data-tab="matchups">Matchups</button>
      <button class="tabs__btn" data-tab="info">Info</button>
    </div>

    <!-- Dynamic content -->
    <div id="content">
      <div style="text-align:center;padding:60px;color:var(--text-muted)">Loading tournament data…</div>
    </div>
  </div>

  <script type="module" src="js/app.js?v=11"></script>
</body>
</html>
